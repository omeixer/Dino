<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="ChiefData Offline Runner - Play anywhere, even without internet!">
  <meta name="theme-color" content="#4CAF50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ChiefData Runner">
  
  <title>ChiefData Runner | Offline PWA Game</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Icons for different platforms -->
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Preconnect for faster loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
  <div id="app">
    <!-- Install PWA Prompt -->
    <div id="installPrompt" class="install-prompt" style="display: none;">
      <div class="install-content">
        <span>📱 Install App</span>
        <span>Play offline anytime!</span>
        <button id="installBtn" class="install-btn">📲 Install</button>
        <button id="closeInstallBtn" class="close-btn">✕</button>
      </div>
    </div>
    
    <div class="game-container">
      <canvas id="gameCanvas"></canvas>
      
      <!-- Pause Overlay -->
      <div id="pauseOverlay" class="pause-overlay" style="display: none;">
        <div class="pause-menu">
          <h2>⏸ GAME PAUSED</h2>
          <p>Press <kbd>P</kbd> or click RESUME to continue</p>
          <button id="resumeBtn" class="action-btn">▶ RESUME GAME</button>
          <button id="restartFromPauseBtn" class="action-btn secondary">🔄 RESTART</button>
        </div>
      </div>
    </div>
    
    <div class="game-ui">
      <div class="stats-panel">
        <div class="stat">🎯 SCORE: <span id="scoreValue">0</span></div>
        <div class="stat">🏆 BEST: <span id="bestScoreSpan">0</span></div>
        <div class="stat">⚡ SPEED: <span id="speedValue">0</span></div>
      </div>
      
      <div class="controls-panel">
        <button id="mainActionBtn" class="action-btn">🚀 START GAME</button>
        <button id="pauseBtn" class="action-btn pause-btn">⏸ PAUSE</button>
        <button id="soundToggle" class="sound-btn">🔊 SOUND ON</button>
        <button id="darkModeToggle" class="theme-btn">🌙 DARK MODE</button>
      </div>
      
      <div class="instructions">
        <kbd>SPACE</kbd> <kbd>↑</kbd> <kbd>W</kbd> to Jump | 
        <kbd>P</kbd> to Pause/Resume | 
        <kbd>R</kbd> to Restart
      </div>
      
      <div class="pwa-status">
        <span id="pwaStatus">⚡ PWA Ready - Install for offline play</span>
      </div>
    </div>
  </div>
  
  <script src="game.js"></script>
  <script>
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(registration => {
          console.log('ServiceWorker registered successfully:', registration.scope);
          document.getElementById('pwaStatus').innerHTML = '✅ PWA Active - Works offline!';
          document.getElementById('pwaStatus').style.background = '#4CAF50';
        }).catch(error => {
          console.log('ServiceWorker registration failed:', error);
          document.getElementById('pwaStatus').innerHTML = '⚠️ PWA available - Refresh to install';
        });
      });
    }
    
    // PWA Install Prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installPrompt').style.display = 'flex';
    });
    
    document.getElementById('installBtn').addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log(`User response to the install prompt: ${outcome}`);
        deferredPrompt = null;
        document.getElementById('installPrompt').style.display = 'none';
      }
    });
    
    document.getElementById('closeInstallBtn').addEventListener('click', () => {
      document.getElementById('installPrompt').style.display = 'none';
    });
  </script>
</body>
</html>
